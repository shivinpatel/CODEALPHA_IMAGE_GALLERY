<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Premiumn image Gallery</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://kit.fontawesome.com/6c8d5f4b1b.js"
        crossorigin="anonymous"></script>

</head>

<body>

<header>

<div class="logo">

<i class="fa-solid fa-camera-retro"></i>

<h2>Premium image Gallery</h2>

</div>

<nav>

<button class="filter active"
data-filter="all">

All

</button>

<button class="filter"
data-filter="nature">

Nature

</button>

<button class="filter"
data-filter="city">

City

</button>

<button class="filter"
data-filter="animals">

Animals

</button>

<button class="filter"
data-filter="travel">

Travel

</button>

</nav>

</header>

<section class="hero">

<h1>Premium Image Gallery</h1>

<p>

Explore beautiful moments with smooth animations,
responsive layout and modern UI.

</p>

</section>

<section class="gallery">

<div class="card nature">

<img src="img1.jpg">

<div class="overlay">

<h3>Mountains</h3>

</div>

</div>

<div class="card city">

<img src="img2.avif">

<div class="overlay">

<h3>New York</h3>

</div>

</div>

<div class="card animals">

<img src="img3.jpg">

<div class="overlay">

<h3>Wild Lion</h3>

</div>

</div>

<div class="card travel">

<img src="img4.webp">

<div class="overlay">

<h3>Beach</h3>

</div>

</div>

<div class="card nature">

<img src="img5.jpg">

<div class="overlay">

<h3>Forest</h3>

</div>

</div>

<div class="card city">

<img src="img6.webp">

<div class="overlay">

<h3>Night Lights</h3>

</div>

</div>

<div class="card animals">

<img src="img7.jpg">

<div class="overlay">

<h3>Parrot</h3>

</div>

</div>

<div class="card travel">

<img src="img8.jpg">

<div class="overlay">

<h3>Waterfall</h3>

</div>

</div>

</section>

<div class="lightbox">

<span class="close">

&times

</span>

<img class="lightbox-img">

<div class="buttons">

<button id="prev">

<i class="fa-solid fa-chevron-left"></i>

</button>

<button id="next">

<i class="fa-solid fa-chevron-right"></i>

</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
